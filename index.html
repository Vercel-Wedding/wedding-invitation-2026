    <script>
        class Formatter {
            static localizeNumber(numStr, langIndex) {
                if (numStr === undefined || numStr === null) return "";
                if (langIndex === 1) { // 1 = Dari
                    const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
                    return numStr.toString().replace(/\d/g, x => persianDigits[x]);
                }
                return numStr;
            }

            /** * Scans text for Farsi/Arabic characters. If purely Latin, 
             * forces the beautiful standard fonts to prevent Nastaliq stretching. 
             */
            static applySmartLatinClass(el, text, isSerif) {
                if (!el || !text) return;
                const hasFarsi = /[\u0600-\u06FF\u0750-\u077F]/.test(text);
                if (!hasFarsi && text.trim().length > 0) {
                    el.classList.add(isSerif ? 'force-latin-serif' : 'force-latin-sans');
                } else {
                    el.classList.remove('force-latin-serif', 'force-latin-sans');
                }
            }

            static setText(el, text, isSerif = false) {
                if (!el) return;
                el.innerText = text;
                this.applySmartLatinClass(el, text, isSerif);
            }

            static setHtml(el, html, plainTextForCheck, isSerif = false) {
                if (!el) return;
                el.innerHTML = html;
                this.applySmartLatinClass(el, plainTextForCheck, isSerif);
            }
            
            static setPlaceholder(elId, text) {
                const el = document.getElementById(elId);
                if (!el) return;
                el.placeholder = text;
                this.applySmartLatinClass(el, text, false);
            }
        }

        class ToastService {
            static show(msg) {
                const box = document.getElementById('notification-box');
                document.getElementById('notification-text').innerText = msg;
                box.classList.add('show');
                setTimeout(() => box.classList.remove('show'), 3500);
            }
        }

        class AudioService {
            constructor(config) {
                this.audio = document.getElementById('bg-music');
                this.btn = document.getElementById('music-control');
                this.iconCont = document.getElementById('music-icon-container');
                this.config = config.MUSIC_LOOP;
                this.isUserIntentional = false;
                this.fadeInterval = null;
                this.initListeners();
            }

            initListeners() {
                this.btn.addEventListener('click', () => this.toggle());

                this.audio.addEventListener('timeupdate', () => {
                    if (!this.audio.duration || this.fadeInterval) return;
                    const timeLeft = this.audio.duration - this.audio.currentTime;
                    if (timeLeft <= this.config.fadeOutSeconds && timeLeft > 0) {
                        this.audio.volume = Math.max(0, timeLeft / this.config.fadeOutSeconds);
                    } else if (timeLeft > this.config.fadeOutSeconds && this.audio.volume < 1) {
                        this.audio.volume = 1;
                    }
                });

                this.audio.addEventListener('ended', () => {
                    if (this.isUserIntentional) {
                        setTimeout(() => {
                            if (this.isUserIntentional) {
                                this.audio.currentTime = 0;
                                this.audio.volume = 1;
                                this.play();
                            }
                        }, this.config.silenceSeconds * 1000);
                    }
                });
            }

            setSource(src) {
                const wasPlaying = !this.audio.paused && this.isUserIntentional;
                this.audio.src = src;
                if (wasPlaying) {
                    this.audio.volume = 1;
                    this.play();
                }
            }

            play() {
                clearInterval(this.fadeInterval);
                this.fadeInterval = null;
                if (!this.audio.src || this.audio.src === window.location.href) return;
                const promise = this.audio.play();
                if (promise !== undefined) {
                    promise.then(() => this.updateUI(true)).catch(e => console.log("Auto-play prevented"));
                }
            }

            pause() {
                clearInterval(this.fadeInterval);
                this.fadeInterval = null;
                this.audio.pause();
                this.updateUI(false);
            }

            toggle() {
                clearInterval(this.fadeInterval);
                this.fadeInterval = null;
                if (this.audio.paused || !this.isUserIntentional) {
                    this.audio.volume = 1;
                    this.isUserIntentional = true;
                    this.play();
                } else {
                    this.isUserIntentional = false;
                    this.pause();
                }
            }

            fadeOut(seconds, callback) {
                if (this.audio.paused) {
                    if (callback) callback();
                    return;
                }
                const steps = 20; 
                const volStep = this.audio.volume / (seconds * steps);
                clearInterval(this.fadeInterval);
                this.fadeInterval = setInterval(() => {
                    let newVol = this.audio.volume - volStep;
                    if (newVol <= 0.05) { 
                        this.audio.volume = 0;
                        this.pause();
                        clearInterval(this.fadeInterval);
                        this.fadeInterval = null;
                        if (callback) callback();
                    } else {
                        this.audio.volume = newVol;
                    }
                }, 1000 / steps);
            }

            fadeIn(seconds) {
                this.audio.volume = 0;
                this.play();
                const steps = 20;
                const volStep = 1.0 / (seconds * steps);
                clearInterval(this.fadeInterval);
                this.fadeInterval = setInterval(() => {
                    let newVol = this.audio.volume + volStep;
                    if (newVol >= 0.95) { 
                        this.audio.volume = 1;
                        clearInterval(this.fadeInterval);
                        this.fadeInterval = null;
                    } else {
                        this.audio.volume = newVol;
                    }
                }, 1000 / steps);
            }

            updateUI(isPlaying) {
                if (isPlaying) {
                    this.iconCont.innerHTML = `<i data-lucide="volume-2" width="20" height="20"></i>`;
                    this.btn.classList.add('music-playing');
                } else {
                    this.iconCont.innerHTML = `<i data-lucide="volume-x" width="20" height="20"></i>`;
                    this.btn.classList.remove('music-playing');
                }
                lucide.createIcons();
            }
        }

        class ParticleEngine {
            constructor(config) {
                this.config = config.ANIMATION;
                this.canvas = document.getElementById('gold-dust-canvas');
                this.ctx = this.canvas.getContext('2d');
            }

            start(onMidpointCallback) {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.canvas.classList.remove('hidden');
                
                const totalFrames = Math.floor(this.config.durationSeconds * 60);
                const revealFrame = Math.floor(totalFrames * 0.4); 
                const particles = this.generateParticles(totalFrames);
                
                let frame = 0;
                let callbackFired = false;

                const render = () => {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    let active = false;
                    const cx = this.canvas.width / 2;
                    const cy = this.canvas.height / 2;
                    const fadeOutFrames = 60;
                    let endFadeAlpha = frame > totalFrames - fadeOutFrames ? Math.max(0, (totalFrames - frame) / fadeOutFrames) : 1;

                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy; p.z += p.vz;
                        if (p.z > 0 && p.z < 2000) {
                            active = true;
                            const scale = 350 / Math.max(1, p.z);
                            const alpha = Math.min(1, p.z / 80) * endFadeAlpha;
                            this.ctx.beginPath();
                            this.ctx.arc(cx + p.x * scale, cy + p.y * scale, Math.min(p.size * scale, 35), 0, Math.PI * 2);
                            this.ctx.fillStyle = p.color;
                            this.ctx.globalAlpha = alpha;
                            this.ctx.fill();
                        }
                    });

                    frame++;
                    if (frame >= revealFrame && !callbackFired) {
                        callbackFired = true;
                        if(onMidpointCallback) onMidpointCallback();
                    }

                    if (active && frame < totalFrames + 60) {
                        requestAnimationFrame(render);
                    }
                    if (frame === totalFrames) this.canvas.classList.add('transition-opacity', 'duration-1000', 'opacity-0');
                    else if (frame === totalFrames + 60) this.canvas.classList.add('hidden');
                };
                render();
            }

            generateParticles(totalFrames) {
                const arr = [];
                const baseSpeed = 1200 / totalFrames; 
                for (let i = 0; i < this.config.particleCount; i++) {
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const speed = (Math.random() * baseSpeed * 2 + baseSpeed) * this.config.speedFactor; 
                    arr.push({
                        x: 0, y: 0, z: Math.random() * 800 + 200, 
                        vx: Math.sin(phi) * Math.cos(theta) * speed * 0.8,
                        vy: Math.sin(phi) * Math.sin(theta) * speed * 0.8,
                        vz: -(Math.abs(Math.cos(phi)) * speed + baseSpeed * this.config.speedFactor * 1.5),
                        size: Math.random() * 1.5 + 0.5,
                        color: this.config.particleColors[Math.floor(Math.random() * this.config.particleColors.length)]
                    });
                }
                return arr;
            }
        }

        class FormController {
            constructor(config) {
                this.endpoint = config.FORMSPREE_ENDPOINT;
                this.guestCount = 1;
                this.initListeners();
            }

            initListeners() {
                const btnMinus = document.getElementById('btn-guest-minus');
                const btnPlus = document.getElementById('btn-guest-plus');
                if (btnMinus) btnMinus.addEventListener('click', () => this.adjustGuests(-1));
                if (btnPlus) btnPlus.addEventListener('click', () => this.adjustGuests(1));
                
                const wishForm = document.getElementById('song-wish-form');
                const rsvpForm = document.getElementById('rsvp-form');
                if (wishForm) wishForm.addEventListener('submit', (e) => this.submit(e, 'song-submit-btn'));
                if (rsvpForm) rsvpForm.addEventListener('submit', (e) => this.submit(e, 'rsvp-submit-btn', true));
            }

            adjustGuests(amt, reset = false) {
                if (reset) { this.guestCount = 1; } 
                else { this.guestCount = Math.max(1, Math.min(100, this.guestCount + amt)); }
                const disp = document.getElementById('guest-count-display');
                if (disp) disp.innerText = Formatter.localizeNumber(this.guestCount, window.App.langController.currentIndex);
                const inp = document.getElementById('guest-count-input');
                if (inp) inp.value = this.guestCount;
            }

            async submit(e, btnId, isRsvp = false) {
                e.preventDefault();
                const form = e.target;
                const btn = document.getElementById(btnId);
                const formData = new FormData(form);
                const originalHTML = btn.innerHTML;
                const successMsg = WEDDING_CONFIG.translations[window.App.langController.currentIndex].toastSent;
                
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader" class="animate-spin"></i>`;
                lucide.createIcons();

                try {
                    if (this.endpoint.includes("your_id_here")) {
                        await new Promise(r => setTimeout(r, 1000));
                        ToastService.show(successMsg);
                        form.reset();
                        if (isRsvp) this.adjustGuests(0, true);
                    } else {
                        const response = await fetch(this.endpoint, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
                        if (response.ok) {
                            ToastService.show(successMsg);
                            form.reset();
                            if (isRsvp) this.adjustGuests(0, true);
                        } else ToastService.show("Error sending.");
                    }
                } catch (err) { ToastService.show("Network error."); }
                
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }

                e.preventDefault();
                const inputField = document.getElementById('gal-pass-ph');

                    setTimeout(() => inputField.classList.remove('border', 'border-red-500'), 2000);

                if (this.config.isLockedBeforeWedding) showError(currLangObj.toastGallery);

                else {

            initDOM() {
                const root = document.documentElement;

                    document.getElementById(`top-btn-${i}`).onclick = () => this.langController.select(i);

                document.getElementById('loc-map-iframe').src = this.config.location.mapUrl;
                document.getElementById('loc-button').href = this.config.location.link;
                
                // Hide sections conditionally
                ['invitation', 'countdown', 'program', 'location', 'music', 'gallery', 'rsvp'].forEach(sec => {
                    if (!this.config.SECTIONS[sec]) {
                        const el = document.getElementById(`section-${sec}`);
                        if (el) el.style.display = 'none';
                    }
                });

                if (!this.config.FEATURES.rsvpGuestCounter) {
                    const guestWrapper = document.getElementById('rsvp-guest-counter-wrapper');
                    if (guestWrapper) guestWrapper.style.display = 'none';
                }

                // Bulletproof Spotify URL Parser + Dark Theme injection
                let embedUrl = this.config.SPOTIFY.url;
                const match = embedUrl.match(/(track|album|artist|playlist|show|episode)[\/\:]([a-zA-Z0-9]+)/);
                if (match) {
                    embedUrl = `https://open.spotify.com/embed/${match[1]}/${match[2]}?utm_source=generator`;
                    if (this.config.SPOTIFY.darkTheme) {
                        embedUrl += `&theme=0`;
                    }
                } else if (this.config.SPOTIFY.darkTheme && !embedUrl.includes('theme=')) {
                    // Fallback just in case you paste an already-formatted embed link
                    embedUrl += (embedUrl.includes('?') ? '&' : '?') + 'theme=0';
                }
                
                const spotifyIframe = document.getElementById('spotify-iframe');
                if (spotifyIframe) {
                    spotifyIframe.src = embedUrl;
                    spotifyIframe.style.height = this.config.STYLING_SIZES.spotifyHeight || "352px";
                }
                
                this.renderIcons();
            }

            renderIcons() {
                const iconMap = {
                    'icon-invitation': { path: this.config.assets.icons.invitation, icon: 'mail' },
                    'icon-countdown': { path: this.config.assets.icons.countdown, icon: 'clock' },
                    'icon-program': { path: this.config.assets.icons.program, icon: 'heart' },
                    'icon-location': { path: this.config.assets.icons.location, icon: 'map-pin' },
                    'icon-music': { path: this.config.assets.icons.music, icon: 'music' },
                    'icon-gallery': { path: this.config.assets.icons.gallery, icon: 'lock' },
                    'icon-rsvp': { path: this.config.assets.icons.rsvp, icon: 'calendar-heart' }
                };
                const size = this.config.ANIMATION.sectionIconSize;
                for (const [id, data] of Object.entries(iconMap)) {
                    const c = document.getElementById(id);
                    if (c) c.innerHTML = data.path ? `<img src="${data.path}" style="width: ${size}px; height: ${size}px; object-fit: contain;" class="mx-auto">` : `<i data-lucide="${data.icon}" stroke-width="1" width="${size}" height="${size}"></i>`;
                }
                lucide.createIcons();
            }

            initIntroSequence() {
                const v1 = document.getElementById('intro-video');
                v1.src = this.config.assets.introVideo;

                const revealApp = () => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    document.getElementById('music-control').classList.remove('hidden');
                    document.getElementById('top-lang-switcher').classList.remove('hidden');
                    
                    const main = document.getElementById('main-content');
                    main.classList.remove('hidden');
                    void main.offsetWidth; 
                    main.classList.remove('opacity-0');
                    
                    const hero = document.getElementById('hero-section');
                    hero.classList.remove('translate-y-[20vh]', 'opacity-0');
                    hero.classList.add('translate-y-0', 'opacity-100', 'is-revealed'); 
                    
                    document.body.classList.remove('no-scroll');
                    setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 1000);
                };

                const triggerReveal = () => {
                    if (this.config.FEATURES.goldParticles) {
                        this.particleEngine.start(revealApp);
                    } else {
                        revealApp();
                    }
                };

                const executeOverlap = () => {
                    if (!this.hasStarted && v1.duration > 0) {
                        const timeLeft = v1.duration - v1.currentTime;
                        if (timeLeft <= this.config.ANIMATION.overlapTimingSeconds) {
                            this.hasStarted = true;
                            triggerReveal();
                            v1.style.transition = `opacity ${timeLeft}s ease-in-out`;
                            v1.style.opacity = '0';
                        }
                    }
                    if (!this.hasStarted && !v1.paused) this.checkOverlapFrame = requestAnimationFrame(executeOverlap);
                };

                // Added click handler to the ENTIRE splash screen wrapper so clicking text also triggers it safely
                document.getElementById('splash-screen').onclick = (e) => {
                    if (e.target.id === 'skip-btn') return;
                    
                    document.getElementById('tap-indicator').style.opacity = '0';
                    document.getElementById('skip-btn').classList.remove('hidden');
                    
                    this.audioService.isUserIntentional = true;
                    this.audioService.play();

                    const promise = v1.play(); 
                    if (promise !== undefined) {
                        promise.then(() => { this.checkOverlapFrame = requestAnimationFrame(executeOverlap); })
                               .catch(() => { if (!this.hasStarted) { this.hasStarted = true; triggerReveal(); } });
                    } else if (!this.hasStarted) { this.hasStarted = true; triggerReveal(); }
                };

                v1.onended = () => {
                    if (!this.hasStarted) { this.hasStarted = true; triggerReveal(); v1.style.opacity = '0'; }
                };

                document.getElementById('skip-btn').onclick = (e) => { 
                    e.stopPropagation();
                    v1.pause(); 
                    cancelAnimationFrame(this.checkOverlapFrame);
                    if (!this.hasStarted) { this.hasStarted = true; triggerReveal(); v1.style.transition = 'opacity 0.5s ease-out'; v1.style.opacity = '0'; }
                };
            }

            initCountdown() {
                setInterval(() => {
                    const dist = new Date(this.config.weddingDate).getTime() - Date.now();
                    if (dist < 0) return;
                    const d = Math.floor(dist/86400000).toString().padStart(2,'0');
                    const h = Math.floor((dist%86400000)/3600000).toString().padStart(2,'0');
                    const m = Math.floor((dist%3600000)/60000).toString().padStart(2,'0');
                    const s = Math.floor((dist%60000)/1000).toString().padStart(2,'0');
                    
                    const fd = Formatter.localizeNumber(d, this.langController.currentIndex);
                    const fh = Formatter.localizeNumber(h, this.langController.currentIndex);
                    const fm = Formatter.localizeNumber(m, this.langController.currentIndex);
                    const fs = Formatter.localizeNumber(s, this.langController.currentIndex);
                    
                    Formatter.setText(document.getElementById('cd-days'), fd, true);
                    Formatter.setText(document.getElementById('cd-hours'), fh, true);
                    Formatter.setText(document.getElementById('cd-mins'), fm, true);
                    Formatter.setText(document.getElementById('cd-secs'), fs, true);
                }, 1000);
            }

            initScrollReveal() {
                const obs = new IntersectionObserver((es) => es.forEach(e => e.isIntersecting && e.target.classList.add('is-visible')), { threshold: 0.1 });
                document.querySelectorAll('.reveal-on-scroll').forEach(s => obs.observe(s));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.App = new WeddingApp(WEDDING_CONFIG);
        });

    </script>
</body>
</html>
